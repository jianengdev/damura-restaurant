<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const queryTheme = params.get('theme');
    const savedTheme = localStorage.getItem('damura-theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = queryTheme === 'light' || queryTheme === 'dark'
      ? queryTheme
      : (savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : (prefersDark ? 'dark' : 'light'));
    document.documentElement.classList.remove('dark', 'light');
    document.documentElement.classList.add(initialTheme);
  })();
</script>

let cart = JSON.parse(localStorage.getItem('damura-cart')||'[]');

function getThemeFromUrl() {
  const value = new URLSearchParams(window.location.search).get('theme');
  return value === 'light' || value === 'dark' ? value : null;
}

function getStoredTheme() {
  const value = localStorage.getItem('damura-theme');
  return value === 'light' || value === 'dark' ? value : null;
}

function getActiveTheme() {
  if (document.documentElement.classList.contains('light')) return 'light';
  return 'dark';
}

function syncThemeInUrl(theme) {
  const url = new URL(window.location.href);
  url.searchParams.set('theme', theme);
  window.history.replaceState({}, '', url);
}

function syncThemeLinks(theme) {
  document.querySelectorAll('a[href]').forEach((link) => {
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
    const parsed = new URL(href, window.location.href);
    if (!parsed.pathname.endsWith('.html')) return;
    parsed.searchParams.set('theme', theme);
    link.setAttribute('href', parsed.toString());
  });
}

function updateThemeToggle(theme) {
  const icon = document.getElementById('theme-toggle-icon');
  const label = document.getElementById('theme-toggle-label');
  if (!icon || !label) return;
  icon.textContent = theme === 'light' ? 'dark_mode' : 'light_mode';
  label.textContent = theme === 'light' ? 'Oscuro' : 'Claro';
}

function applyTheme(theme, options = {}) {
  const persist = options.persist !== false;
  const updateUrl = options.updateUrl !== false;
  document.documentElement.classList.remove('dark', 'light');
  document.documentElement.classList.add(theme);
  if (persist) localStorage.setItem('damura-theme', theme);
  if (updateUrl) syncThemeInUrl(theme);
  syncThemeLinks(theme);
  updateThemeToggle(theme);
}

function toggleTheme() {
  const next = getActiveTheme() === 'dark' ? 'light' : 'dark';
  applyTheme(next);
}

function goToCheckout() {
  const target = new URL('checkout.html', window.location.href);
  target.searchParams.set('theme', getActiveTheme());
  window.location.href = target.toString();
}

function initTheme() {
  const queryTheme = getThemeFromUrl();
  const storedTheme = getStoredTheme();
  const defaultTheme = queryTheme || storedTheme || 'dark';
  applyTheme(defaultTheme, { persist: false, updateUrl: !!queryTheme });
  document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);
}

function saveCart(){localStorage.setItem('damura-cart',JSON.stringify(cart));}
function getItem(id){return cart.find(i=>i.id===id);}
function getCount(){return cart.reduce((s,i)=>s+i.qty,0);}
function getTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0);}

function addToCart(id){
  const p=PRODUCTS.find(p=>p.id===id); if(!p)return;
  const ex=getItem(id);
  if(ex){ex.qty+=1;}else{cart.push({id:p.id,name:p.name,price:p.price,qty:1});}
  saveCart(); updateCartBar(); updateCardUI(id);
}
function removeFromCart(id){
  const ex=getItem(id); if(!ex)return;
  if(ex.qty>1){ex.qty-=1;}else{cart=cart.filter(i=>i.id!==id);}
  saveCart(); updateCartBar(); updateCardUI(id);
}
function updateCartBar(){
  const n=getCount(); const total=getTotal();
  document.getElementById('cart-count').textContent=n;
  document.getElementById('cart-total').textContent=total.toFixed(2)+'€';
  document.getElementById('cart-bar').classList.toggle('hidden',n===0);
  // also update header mini-cart
  const link=document.getElementById('header-cart-link');
  if(n>0){
    link.classList.remove('hidden'); link.classList.add('flex');
    document.getElementById('header-cart-count').textContent=n;
    document.getElementById('header-cart-total').textContent=total.toFixed(2)+'€';
  } else {
    link.classList.add('hidden'); link.classList.remove('flex');
  }
}
function updateCardUI(id){
  const item=getItem(id); const qty=item?item.qty:0;
  const addBtn=document.getElementById('add-'+id);
  const qtyCtrl=document.getElementById('qty-'+id);
  const qtyLbl=document.getElementById('ql-'+id);
  if(!addBtn||!qtyCtrl)return;
  addBtn.classList.toggle('hidden',qty>0);
  qtyCtrl.classList.toggle('hidden',qty===0);
  if(qtyLbl)qtyLbl.textContent=qty;
}

function renderProducts(filter){
  const items=filter==='all'?PRODUCTS:PRODUCTS.filter(p=>p.cat===filter);
  document.getElementById('product-grid').innerHTML=items.map(p=>{
    const item=getItem(p.id); const qty=item?item.qty:0;
    const img=BASE_IMG+p.id+'/image_512';
    const descHtml = p.desc ? `<p class="product-desc text-white/40 text-xs font-[Be_Vietnam_Pro] mt-1.5 leading-relaxed line-clamp-2">${p.desc}</p>` : '';
    return `<article class="group product-card">
      <div class="product-media aspect-[4/5] overflow-hidden mb-4 bg-[#231f1f] relative">
        <img src="${img}" alt="${p.name}"
          class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out"
          onerror="this.style.opacity='0'"/>
        <div class="absolute inset-0 flex items-end justify-end p-3 pointer-events-none">
          <button id="add-${p.id}" onclick="addToCart(${p.id})" class="product-add pointer-events-auto ${qty>0?'hidden':''} bg-[#C40F23] text-white w-10 h-10 flex items-center justify-center hover:scale-110 active:scale-90 transition-all shadow-lg">
            <span class="material-symbols-outlined block leading-none" style="font-size:20px">add</span>
          </button>
          <div id="qty-${p.id}" class="product-qty ${qty===0?'hidden':''} pointer-events-auto bg-[#C40F23] text-white flex items-center shadow-lg">
            <button onclick="removeFromCart(${p.id})" class="px-2 py-2 hover:bg-black/10 active:scale-90 transition-all">
              <span class="material-symbols-outlined leading-none" style="font-size:18px">remove</span>
            </button>
            <span id="ql-${p.id}" class="font-[Space_Grotesk] font-semibold text-sm min-w-[1.2rem] text-center">${qty}</span>
            <button onclick="addToCart(${p.id})" class="px-2 py-2 hover:bg-black/10 active:scale-90 transition-all">
              <span class="material-symbols-outlined leading-none" style="font-size:18px">add</span>
            </button>
          </div>
        </div>
      </div>
      <div>
        <div class="flex justify-between items-start gap-2">
          <div class="flex-1 min-w-0">
            <p class="product-cat font-[Space_Grotesk] text-[10px] tracking-widest uppercase text-[#C40F23]/80 mb-1">${p.catLabel}</p>
            <h3 class="product-title font-[Epilogue] font-medium text-white text-base leading-snug">${p.name}</h3>
          </div>
          <span class="product-price font-[Space_Grotesk] font-semibold text-sm text-[#E8B33D] whitespace-nowrap mt-1">${p.price.toFixed(2)}€</span>
        </div>
        ${descHtml}
      </div>
    </article>`;
  }).join('');
}

function filterCategory(cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('is-active'));
  const a=document.querySelector('[data-cat="'+cat+'"]');
  if(a){a.classList.add('is-active');}
  // Force a reliable scroll reset across browsers before and after the grid rerender.
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  renderProducts(cat);
  requestAnimationFrame(()=>{
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  });
}

initTheme();
renderProducts('all');
updateCartBar();
